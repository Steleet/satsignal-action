name: smoke

# Self-test: run the action against a tiny file and confirm it returns
# a chain-confirmed receipt. Requires repository secret SATSIGNAL_API_KEY
# (anchors:create scope). The dedup gate means re-runs return the prior
# receipt without burning new quota — this can run on every push.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly canary — flags if the action breaks against the prod API
    # without anyone landing a change.
    - cron: '0 12 * * 1'

jobs:
  jq16-compat:
    # The default-path jq object literal once carried a trailing comma —
    # accepted by jq 1.7 (ubuntu-24.04) but a SYNTAX ERROR on jq 1.6
    # (ubuntu-22.04 runners and many self-hosted boxes), which killed the
    # anchor step under `set -euo pipefail` (probe S2-F2, 2026-06-10).
    # Guard the whole class statically: no line in action.yml may end
    # with a comma when the next code line opens with `}` or `)`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No trailing commas before closing braces (jq 1.6 compat)
        run: |
          set -euo pipefail
          BAD="$(awk 'prev ~ /,[[:space:]]*$/ && $0 ~ /^[[:space:]]*[})]/ \
                        {print prevnr ": " prev} \
                      {prev=$0; prevnr=NR}' action.yml)"
          if [[ -n "$BAD" ]]; then
            echo "::error::trailing comma before }/) in action.yml — jq 1.6 rejects this:"
            echo "$BAD"
            exit 1
          fi
          echo "OK: no trailing commas before closing braces."

  anchor-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test artifact
        # Deterministic content → same sha across runs → dedup hits the
        # second time onward, no new on-chain broadcast / quota burn.
        run: |
          mkdir -p _smoke
          printf 'satsignal-action smoke test\n' > _smoke/artifact.txt
          echo "Expected sha256:"
          sha256sum _smoke/artifact.txt

      - name: Anchor the test artifact (legacy `matter:` input)
        id: anchor
        uses: ./
        with:
          path: _smoke/artifact.txt
          # `inbox` is auto-provisioned in every Satsignal workspace,
          # so the smoke needs no preflight folder-create step. For
          # production workflows pick a dedicated folder.
          # Exercises the FROZEN legacy `matter:` input on purpose.
          matter: inbox
          label: ${{ github.workflow }}-${{ github.run_id }}
          api-key: ${{ secrets.SATSIGNAL_API_KEY }}

      - name: Anchor the same artifact (new `folder:` input)
        id: anchor_folder
        uses: ./
        with:
          path: _smoke/artifact.txt
          # Same deterministic content + same slug as above → the API
          # dedup gate returns the prior proof, no new broadcast / quota
          # burn. Exercises the new public `folder:` input.
          folder: inbox
          label: ${{ github.workflow }}-${{ github.run_id }}
          api-key: ${{ secrets.SATSIGNAL_API_KEY }}

      - name: Assert proof outputs are populated (both spellings)
        run: |
          set -euo pipefail
          LOCAL_SHA="$(sha256sum _smoke/artifact.txt | awk '{print $1}')"

          # --- legacy `matter:` run: every legacy + new output set ---
          test -n "${{ steps.anchor.outputs.bundle_id }}"  || { echo "::error::bundle_id empty"; exit 1; }
          test -n "${{ steps.anchor.outputs.txid }}"       || { echo "::error::txid empty"; exit 1; }
          test -n "${{ steps.anchor.outputs.sha256 }}"     || { echo "::error::sha256 empty"; exit 1; }
          test -n "${{ steps.anchor.outputs.proof_id }}"   || { echo "::error::proof_id empty"; exit 1; }
          test -n "${{ steps.anchor.outputs.proof_url }}"  || { echo "::error::proof_url empty"; exit 1; }
          test "${{ steps.anchor.outputs.sha256 }}" = "$LOCAL_SHA" \
            || { echo "::error::sha256 output does not match local digest"; exit 1; }
          # New aliases must equal the legacy outputs byte-for-byte.
          test "${{ steps.anchor.outputs.proof_id }}"  = "${{ steps.anchor.outputs.bundle_id }}" \
            || { echo "::error::proof_id != bundle_id"; exit 1; }
          test "${{ steps.anchor.outputs.proof_url }}" = "${{ steps.anchor.outputs.receipt_url }}" \
            || { echo "::error::proof_url != receipt_url"; exit 1; }

          # --- new `folder:` run: same outputs, same sha ---
          test -n "${{ steps.anchor_folder.outputs.proof_id }}"  || { echo "::error::folder run proof_id empty"; exit 1; }
          test -n "${{ steps.anchor_folder.outputs.proof_url }}" || { echo "::error::folder run proof_url empty"; exit 1; }
          test -n "${{ steps.anchor_folder.outputs.bundle_id }}" || { echo "::error::folder run bundle_id empty (legacy alias must stay populated)"; exit 1; }
          test "${{ steps.anchor_folder.outputs.sha256 }}" = "$LOCAL_SHA" \
            || { echo "::error::folder run sha256 mismatch"; exit 1; }
          # `folder:` and `matter:` resolved to the same slug + same
          # content → same proof.
          test "${{ steps.anchor_folder.outputs.bundle_id }}" = "${{ steps.anchor.outputs.bundle_id }}" \
            || { echo "::error::folder-input run produced a different bundle_id than matter-input run"; exit 1; }
          echo "All assertions passed (legacy matter: + new folder:, both output spellings)."

      - name: Assert conflict rule fires (folder != matter)
        run: |
          set -euo pipefail
          # Drive the composite action's resolution logic directly with
          # the same env contract action.yml uses. Conflicting non-empty
          # values must exit non-zero before any network call.
          export SATSIGNAL_FILE=_smoke/artifact.txt
          export SATSIGNAL_API_KEY=dummy-not-used
          export SATSIGNAL_FOLDER=folder-a
          export SATSIGNAL_MATTER=matter-b
          set +e
          OUT="$(
            {
              FOLDER_IN="${SATSIGNAL_FOLDER:-}"
              MATTER_IN="${SATSIGNAL_MATTER:-}"
              if [[ -n "$FOLDER_IN" && -n "$MATTER_IN" && "$FOLDER_IN" != "$MATTER_IN" ]]; then
                echo "::error::folder and matter are aliases and must not be set to different values; use folder (folder='$FOLDER_IN' matter='$MATTER_IN')" >&2
                exit 1
              fi
              echo "did-not-fail"
            } 2>&1
          )"
          RC=$?
          set -e
          if [[ $RC -eq 0 ]]; then
            echo "::error::conflict rule did NOT fire for differing folder/matter"
            exit 1
          fi
          case "$OUT" in
            *"must not be set to different values; use folder"*) : ;;
            *) echo "::error::conflict message wrong: $OUT"; exit 1 ;;
          esac
          echo "Conflict rule fired correctly (exit $RC)."

          # Equal values must NOT fail (alias accepted).
          set +e
          (
            FOLDER_IN=same; MATTER_IN=same
            if [[ -n "$FOLDER_IN" && -n "$MATTER_IN" && "$FOLDER_IN" != "$MATTER_IN" ]]; then exit 1; fi
            exit 0
          )
          [[ $? -eq 0 ]] || { echo "::error::equal folder/matter values were wrongly rejected"; exit 1; }
          set -e
          echo "Equal folder/matter accepted (alias OK)."

      - name: Verify the anchor is publicly indexed
        # Round-trip the sha through /lookup_hash and confirm the txid
        # we got back matches what the public resolver reports.
        run: |
          set -euo pipefail
          SHA="${{ steps.anchor.outputs.sha256 }}"
          TXID="${{ steps.anchor.outputs.txid }}"
          INDEXED_TXID=$(curl -fsS "https://app.satsignal.cloud/lookup_hash?sha=$SHA" | jq -r '.txid // ""')
          if [[ "$INDEXED_TXID" != "$TXID" ]]; then
            echo "::error::lookup_hash returned txid=$INDEXED_TXID; action returned $TXID"
            exit 1
          fi
          echo "Indexed txid matches: $INDEXED_TXID"
